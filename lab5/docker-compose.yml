version: '3.8'

services:
  db:
    image: postgres:15
    container_name: recipe_db
    environment:
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_password
      POSTGRES_DB: recipe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: recipe_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://recipe_user:recipe_password@db:5432/recipe_db
      EMAIL_HOST: smtp.mailtrap.io
      EMAIL_PORT: 2525
      EMAIL_USER: your_email_user
      EMAIL_PASSWORD: your_email_password
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/xxx/yyy/zzz
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app

volumes:
  postgres_data:
